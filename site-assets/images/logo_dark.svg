<svg width="260" height="70" viewBox="0 0 260 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Exploded Isometric Knowledge Cube Symbol -->
  <!-- Top Face (Cyan) -->
  <path d="M 28 12 L 43 21 L 28 30 L 13 21 Z" fill="#00B4D8" opacity="0.9"/>
  <!-- Bottom-Left Face (Slate Blue) -->
  <path d="M 10 26 L 25 35 L 25 51 L 10 42 Z" fill="#457B9D" opacity="0.9"/>
  <!-- Bottom-Right Face (Soft Gold) -->
  <path d="M 33 35 L 48 26 L 48 42 L 33 51 Z" fill="#E9C46A" opacity="0.9"/>

  <!-- Connecting Nodes & Lines -->
  <circle cx="28" cy="6" r="2" fill="#00B4D8"/>
  <line x1="28" y1="12" x2="28" y2="6" stroke="#00B4D8" stroke-width="1.2" stroke-dasharray="2,2"/>
  
  <circle cx="52" cy="26" r="2" fill="#E9C46A"/>
  <line x1="48" y1="26" x2="52" y2="26" stroke="#E9C46A" stroke-width="1.2" stroke-dasharray="2,2"/>

  <circle cx="6" cy="42" r="2" fill="#457B9D"/>
  <line x1="10" y1="42" x2="6" y2="42" stroke="#457B9D" stroke-width="1.2" stroke-dasharray="2,2"/>

  <!-- Typography -->
  <text x="65" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="1.5">KNOWLEDGE</text>
  <text x="65" y="47" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#00B4D8" letter-spacing="2.5">ARCHITECTURE</text>
</svg>
