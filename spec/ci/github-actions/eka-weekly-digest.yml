# EKA weekly digest workflow.
# Runs a cron job that invokes the eka-weekly-digest agent skill;
# the agent generates a digest doc and opens a PR.

name: EKA Weekly Digest

on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-digest:
    name: Generate weekly digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install eka-helpers
        run: pip install eka-helpers

      - name: Invoke eka-weekly-digest agent
        env:
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}   # or ANTHROPIC_API_KEY
        run: |
          eka skill invoke eka-weekly-digest \
            --plane-project "${{ vars.PLANE_PROJECT_ID }}" \
            --output "digests/weekly/$(date +%Y-W%V).md"

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add weekly digest for $(date +%Y-W%V)"
          title: "Weekly digest — $(date +%Y-W%V)"
          body: |
            Generated by `eka-weekly-digest` agent.

            Please review and merge if accurate. The digest is created
            in `review` status; verify before promoting to `approved`.
          branch: digest/$(date +%Y-W%V)
          labels: digest, agent-generated
